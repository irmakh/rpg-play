<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — DM</title>
<link rel="stylesheet" href="/css/dm.css">
<link rel="stylesheet" href="/css/calendar.css">
<style>
  #cal-today-bar-btns { display:flex; gap:6px; align-items:center; flex-shrink:0; }
</style>
</head>
<body>

<!-- Password gate -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div style="font-size:36px;margin-bottom:10px">📅</div>
    <h2>DM Calendar</h2>
    <p>Enter master password to access the campaign calendar.</p>
    <input type="password" id="gate-pw" placeholder="Master password…" autocomplete="off"
           onkeydown="if(event.key==='Enter')authenticate()">
    <div id="gate-err"></div>
    <button class="btn primary" style="width:100%" onclick="authenticate()">Unlock</button>
  </div>
</div>

<!-- Main content -->
<div class="sheet" id="main-content" style="display:none">

  <div class="hdr">
    <div class="hdr-left">
      <button class="btn" onclick="location.href='/dm.html'">← DM</button>
      <h1>📅 DM Calendar</h1>
      <select id="theme-sel" onchange="applyTheme(this.value)" title="Theme">
        <option value="dark-gold">🌙</option>
        <option value="parchment">📜</option>
        <option value="midnight">🌌</option>
      </select>
    </div>
    <div class="hdr-right">
      <span id="save-status" style="font-size:11px;color:var(--txd)"></span>
    </div>
  </div>

  <div class="cal-wrap">

    <!-- Current campaign date banner -->
    <div class="cal-today-bar">
      <span class="cal-today-label">Campaign Date</span>
      <span class="cal-today-date" id="cal-cur-date-display">—</span>
      <span class="cal-today-year" id="cal-cur-date-year"></span>
      <div id="cal-today-bar-btns">
        <button class="btn sm" onclick="calPrevDay()" title="Previous day">◀ Day</button>
        <button class="btn sm" onclick="calNextDay()" title="Next day">Day ▶</button>
        <button class="btn sm" onclick="calGoToToday()" title="Navigate to current date">Go to Today</button>
        <button class="btn sm" onclick="calOpenJumpModal()" title="Jump to specific date">Set Date…</button>
      </div>
    </div>

    <!-- Month / festival navigation -->
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calNavPage(-1)">&#8592;</button>
      <div class="cal-nav-title">
        <span class="cal-nav-month" id="cal-page-title">—</span>
        <span class="cal-nav-subtitle" id="cal-page-subtitle"></span>
      </div>
      <button class="cal-nav-btn" onclick="calNavPage(1)">&#8594;</button>
    </div>

    <!-- Calendar grid (month) or festival card -->
    <div id="cal-grid-area"></div>

    <!-- Events for current page -->
    <div class="cal-events-hdr">
      <span class="cal-events-title" id="cal-events-section-title">Events</span>
      <button class="btn sm" onclick="calOpenAddEvent()">+ Add Event</button>
    </div>
    <div id="cal-events-list"></div>

  </div>
</div>

<!-- Add / Edit Event Modal -->
<div class="cal-modal" id="cal-event-modal" style="display:none" onclick="if(event.target===this)calCloseEventModal()">
  <div class="cal-modal-box">
    <div class="cal-modal-title" id="cal-modal-title">Add Event</div>

    <div class="cal-form-row">
      <label>Title</label>
      <input type="text" id="cal-ev-title" placeholder="Event title…">
    </div>

    <div class="cal-form-row">
      <label>Description</label>
      <textarea id="cal-ev-desc" rows="3" placeholder="Optional description…"></textarea>
    </div>

    <!-- Date selector -->
    <div class="cal-form-row">
      <label>Date Type</label>
      <select id="cal-ev-date-type" onchange="calToggleDateType()">
        <option value="day">Specific Day</option>
        <option value="festival">Festival Day</option>
      </select>
    </div>

    <div id="cal-ev-day-fields">
      <div class="cal-form-inline">
        <div class="cal-form-row">
          <label>Year (DR)</label>
          <input type="number" id="cal-ev-year" value="1492" min="1" max="9999">
        </div>
        <div class="cal-form-row">
          <label>Month</label>
          <select id="cal-ev-month">
            <option value="1">Hammer</option>
            <option value="2">Alturiak</option>
            <option value="3">Ches</option>
            <option value="4">Tarsakh</option>
            <option value="5">Mirtul</option>
            <option value="6">Kythorn</option>
            <option value="7">Flamerule</option>
            <option value="8">Eleasis</option>
            <option value="9">Eleint</option>
            <option value="10">Marpenoth</option>
            <option value="11">Uktar</option>
            <option value="12">Nightal</option>
          </select>
        </div>
        <div class="cal-form-row">
          <label>Day</label>
          <input type="number" id="cal-ev-day" value="1" min="1" max="30">
        </div>
      </div>
    </div>

    <div id="cal-ev-festival-fields" style="display:none">
      <div class="cal-form-inline">
        <div class="cal-form-row">
          <label>Year (DR)</label>
          <input type="number" id="cal-ev-fest-year" value="1492" min="1" max="9999">
        </div>
        <div class="cal-form-row">
          <label>Festival</label>
          <select id="cal-ev-festival">
            <option value="midwinter">Midwinter</option>
            <option value="greengrass">Greengrass</option>
            <option value="midsummer">Midsummer</option>
            <option value="shieldmeet">Shieldmeet (leap years)</option>
            <option value="highharvestide">Highharvestide</option>
            <option value="feast_of_moon">The Feast of the Moon</option>
          </select>
        </div>
      </div>
    </div>

    <div class="cal-form-row">
      <label>Event Type</label>
      <select id="cal-ev-type">
        <option value="event">Event</option>
        <option value="session">Session</option>
        <option value="milestone">Milestone</option>
        <option value="combat">Combat</option>
        <option value="travel">Travel</option>
        <option value="rest">Rest</option>
        <option value="note">Note</option>
      </select>
    </div>

    <div class="cal-toggle-row">
      <input type="checkbox" id="cal-ev-public">
      <label for="cal-ev-public">Visible to players (public)</label>
    </div>

    <div class="cal-modal-btns">
      <button class="btn danger sm" id="cal-ev-delete-btn" onclick="calDeleteEditingEvent()" style="display:none;margin-right:auto">Delete</button>
      <button class="btn sm" onclick="calCloseEventModal()">Cancel</button>
      <button class="btn primary sm" onclick="calSaveEvent()">Save</button>
    </div>
  </div>
</div>

<!-- Jump to Date Modal -->
<div class="cal-modal" id="cal-jump-modal" style="display:none" onclick="if(event.target===this)calCloseJumpModal()">
  <div class="cal-modal-box">
    <div class="cal-modal-title">Set Campaign Date</div>

    <div class="cal-form-row">
      <label>Date Type</label>
      <select id="cal-jump-type" onchange="calToggleJumpType()">
        <option value="day">Specific Day</option>
        <option value="festival">Festival Day</option>
      </select>
    </div>

    <div id="cal-jump-day-fields">
      <div class="cal-form-inline">
        <div class="cal-form-row">
          <label>Year (DR)</label>
          <input type="number" id="cal-jump-year" value="1492" min="1" max="9999">
        </div>
        <div class="cal-form-row">
          <label>Month</label>
          <select id="cal-jump-month">
            <option value="1">Hammer</option>
            <option value="2">Alturiak</option>
            <option value="3">Ches</option>
            <option value="4">Tarsakh</option>
            <option value="5">Mirtul</option>
            <option value="6">Kythorn</option>
            <option value="7">Flamerule</option>
            <option value="8">Eleasis</option>
            <option value="9">Eleint</option>
            <option value="10">Marpenoth</option>
            <option value="11">Uktar</option>
            <option value="12">Nightal</option>
          </select>
        </div>
        <div class="cal-form-row">
          <label>Day</label>
          <input type="number" id="cal-jump-day" value="1" min="1" max="30">
        </div>
      </div>
    </div>

    <div id="cal-jump-festival-fields" style="display:none">
      <div class="cal-form-inline">
        <div class="cal-form-row">
          <label>Year (DR)</label>
          <input type="number" id="cal-jump-fest-year" value="1492" min="1" max="9999">
        </div>
        <div class="cal-form-row">
          <label>Festival</label>
          <select id="cal-jump-festival">
            <option value="midwinter">Midwinter</option>
            <option value="greengrass">Greengrass</option>
            <option value="midsummer">Midsummer</option>
            <option value="shieldmeet">Shieldmeet</option>
            <option value="highharvestide">Highharvestide</option>
            <option value="feast_of_moon">The Feast of the Moon</option>
          </select>
        </div>
      </div>
    </div>

    <div class="cal-modal-btns">
      <button class="btn sm" onclick="calCloseJumpModal()">Cancel</button>
      <button class="btn primary sm" onclick="calSetCurrentDate()">Set Date</button>
    </div>
  </div>
</div>

<script src="/js/lib/fr_calendar.js" defer></script>
<script src="/js/events.js" defer></script>
</body>
</html>
